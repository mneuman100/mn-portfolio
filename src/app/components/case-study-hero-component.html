<div class="case-study-hero-component">
    <h2 class="page-title">{{ title }}</h2>
    @if (subtitle) {
        <h3 class="page-subtitle">{{ subtitle }}</h3>
    }
    <p class="page-company-info">{{ company }} | {{ year }}</p>

    @if (summary) {
        <p class="summary">{{ summary }}</p>
    }

    <div class="tags">
        @for (tag of tags; track tag) {
            <p class="tag-chip" [class]="getTagClass(tag.color)">{{ tag.skill }}</p>
        }
    </div>
</div>
