<div class="home">
    <main class="home__main">

        <section class="hero">
            <div class="hero__image-wrapper">
                <div class="hero__halo hero__halo--gold"></div>
                <div class="hero__halo hero__halo--coral"></div>
                <img src="pfp.jpg"
                    alt="Meghan Neuman - UX Researcher" class="hero__image" />
            </div>
            <div class="hero__content">
                <h1 class="hero__heading">
                    Technical writing brought me to UX research, and once I arrived, it felt 
                    less like a career change and more like putting a name to <span class="highlight">something I'd 
                    been doing all along.</span>
                </h1>
                <!--<p class="hero__subheading">
                    
                </p>-->
            </div>
        </section>

        <section #workSection id="work" class="work">
            <div class="work__header">
                <p class="work__eyebrow">Selected Work</p>
                <h2 class="work__heading">Case Studies</h2>
            </div>
            <div class="work__grid">
                @for (project of projects; track project.title; let i = $index) {
                <app-project-card appFadeInView [project]="project" [index]="i"
                    [style.transition-delay]="(i * 0.1) + 's'" />
                }
                <div class="work__grid-spacer"></div>
            </div>
        </section>
    </main>
</div>
